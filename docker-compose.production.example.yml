x-ai-video-clipper-service: &ai-video-clipper-service
  image: ai-video-clipper:production
  env_file:
    - path: .env.production
      required: false
  restart: unless-stopped

x-ai-video-clipper-worker-service: &ai-video-clipper-worker-service
  image: ai-video-clipper:production-worker
  build:
    context: .
    dockerfile: Dockerfile
    target: worker-runner
  env_file:
    - path: .env.production
      required: false
  restart: unless-stopped

services:
  app:
    <<: *ai-video-clipper-service
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    command: ["node", "server.js"]
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  migrate:
    <<: *ai-video-clipper-service
    command: ["npm", "run", "prisma:deploy"]
    restart: "no"
    profiles:
      - migrate

  worker-reap:
    <<: *ai-video-clipper-worker-service
    command: ["npm", "run", "worker:reap"]

  worker-reap-polling:
    <<: *ai-video-clipper-worker-service
    command: ["npm", "run", "worker:reap-polling"]

  worker-reap-publish:
    <<: *ai-video-clipper-worker-service
    command: ["npm", "run", "worker:reap-publish"]

  worker-reap-publish-status:
    <<: *ai-video-clipper-worker-service
    command: ["npm", "run", "worker:reap-publish-status"]

  production-check:
    <<: *ai-video-clipper-worker-service
    command: ["npm", "run", "production:check"]
    restart: "no"
    profiles:
      - check
